<!-- index.html - Página Principal IPUC LA FONDA -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="IPUC LA FONDA - Iglesia Pentecostal Unida de Colombia - Donde el Espíritu Santo se mueve">
    <meta name="theme-color" content="#1a237e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>IPUC LA FONDA - Iglesia Pentecostal Unida de Colombia</title>
    
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="assets/logo/icon-192.png">
    <link rel="apple-touch-icon" href="assets/logo/icon-192.png">
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
            <div class="splash-logo">
                <img src="ipuclafonda.png" alt="IPUC LA FONDA">
            </div>
            <h1 class="splash-title">IPUC LA FONDA</h1>
            <p class="splash-subtitle">Donde el Espíritu Santo se mueve</p>
            <div class="splash-loader">
                <div class="loader-ring"></div>
            </div>
        </div>
    </div>

    <!-- App Principal -->
    <div id="app" class="app hidden">
        <!-- Sidebar / Menú lateral -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="logo-mini">
                    <img src="ipuclafonda.png" alt="Logo">
                </div>
                <h2>IPUC LA FONDA</h2>
                <button id="close-sidebar" class="btn-icon">
                    <i class="bx bx-x"></i>
                </button>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#inicio" class="nav-item active" data-page="inicio">
                    <i class="bx bx-home"></i>
                    <span>Inicio</span>
                </a>
                <a href="#horarios" class="nav-item" data-page="horarios">
                    <i class="bx bx-time"></i>
                    <span>Horarios</span>
                </a>
                <a href="#asistencia" class="nav-item" data-page="asistencia">
                    <i class="bx bx-check-circle"></i>
                    <span>Asistencia</span>
                </a>
                <a href="#noticias" class="nav-item" data-page="noticias">
                    <i class="bx bx-news"></i>
                    <span>Noticias</span>
                </a>
                <a href="#eventos" class="nav-item" data-page="eventos">
                    <i class="bx bx-calendar-event"></i>
                    <span>Eventos</span>
                </a>
                <a href="#chat" class="nav-item" data-page="chat">
                    <i class="bx bx-chat"></i>
                    <span>Chat</span>
                    <span class="badge badge-chat hidden">0</span>
                </a>
                <a href="#biblioteca" class="nav-item" data-page="biblioteca">
                    <i class="bx bx-book"></i>
                    <span>Biblioteca</span>
                </a>
                <a href="#galeria" class="nav-item" data-page="galeria">
                    <i class="bx bx-images"></i>
                    <span>Galería</span>
                </a>
                <a href="#perfil" class="nav-item" data-page="perfil">
                    <i class="bx bx-user"></i>
                    <span>Perfil</span>
                </a>
                <a href="#configuracion" class="nav-item" data-page="configuracion">
                    <i class="bx bx-cog"></i>
                    <span>Configuración</span>
                </a>
                
                <!-- Menú Admin -->
                <div id="admin-menu" class="hidden">
                    <hr class="divider">
                    <div class="admin-label">Administración</div>
                    <a href="#dashboard" class="nav-item" data-page="dashboard">
                        <i class="bx bx-line-chart"></i>
                        <span>Dashboard</span>
                    </a>
                    <a href="#usuarios" class="nav-item" data-page="usuarios">
                        <i class="bx bx-group"></i>
                        <span>Usuarios</span>
                    </a>
                    <a href="#versiculos" class="nav-item" data-page="versiculos">
                        <i class="bx bx-bible"></i>
                        <span>Versículos</span>
                    </a>
                </div>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-mini" id="user-mini">
                    <img src="assets/avatars/default.png" alt="Usuario">
                    <div class="user-info">
                        <span class="user-name">Usuario</span>
                        <span class="user-role">Miembro</span>
                    </div>
                    <i class="bx bx-chevron-down"></i>
                </div>
            </div>
        </aside>

        <!-- Contenido Principal -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <button id="menu-toggle" class="btn-icon">
                    <i class="bx bx-menu"></i>
                </button>
                <div class="header-title">
                    <h1 id="page-title">Inicio</h1>
                </div>
                <div class="header-actions">
                    <button id="theme-toggle" class="btn-icon">
                        <i class="bx bx-moon"></i>
                    </button>
                    <button id="notifications-toggle" class="btn-icon notification-btn">
                        <i class="bx bx-bell"></i>
                        <span class="badge badge-notifications hidden">0</span>
                    </button>
                </div>
            </header>

            <!-- Páginas -->
            <div id="page-content" class="page-content">
                <!-- Las páginas se cargarán dinámicamente aquí -->
            </div>
        </main>
    </div>

    <!-- Pantalla de Bienvenida -->
    <div id="welcome-screen" class="welcome-screen hidden">
        <div class="welcome-container">
            <div class="welcome-header">
                <img src="ipuclafonda.png" alt="Templo" class="welcome-templo">
                <h1>IPUC LA FONDA</h1>
                <p>Iglesia Pentecostal Unida de Colombia</p>
            </div>
            <div class="welcome-actions">
                <button id="btn-login" class="btn-primary">Iniciar Sesión</button>
                <button id="btn-register" class="btn-secondary">Registrarse</button>
            </div>
        </div>
    </div>

    <!-- Modales -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <button class="modal-close">
                <i class="bx bx-x"></i>
            </button>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <script src="script.js"></script>
    <script>
        // Registrar Service Worker para PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(registration => {
                    console.log('Service Worker registrado:', registration);
                })
                .catch(error => {
                    console.log('Error al registrar Service Worker:', error);
                });
        }
    </script>
</body>
</html>
